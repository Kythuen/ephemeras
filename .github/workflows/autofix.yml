name: autofix.ci

on:
  pull_request:
    branches:
      - main
permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Lint code
        run: pnpm format

      - name: Autofix ci
        uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27
